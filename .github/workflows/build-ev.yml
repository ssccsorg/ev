name: Build ev CLI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout ssccs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: ssccsorg/ssccs
          path: _ssccs

      - name: Move ssccs into place
        run: mv _ssccs ../ssccs

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Auto-format before strict checks
        run: |
          cargo fmt --all
          cargo clippy --fix --allow-dirty 2>&1 || true
          cargo fix --allow-dirty 2>&1 || true
          cargo fmt --all

      - name: Install Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y -qq yosys

      - name: Full pipeline
        run: bash run.sh --ci
