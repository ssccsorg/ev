name: Build ev CLI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ssccsorg/ev

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Pull or build Docker image (Yosys runtime)
        run: |
          if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null; then
            echo "Image pulled successfully."
          else
            echo "Image not found in registry. Building with shared cache..."
            docker buildx build --load \
              --cache-from type=gha,scope=shared-ev \
              --cache-to type=gha,mode=min,scope=shared-ev \
              -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              -f Dockerfile .
          fi
        shell: bash

      - name: Full pipeline (host build, container Yosys and Spike)
        run: bash run.sh
        env:
          EV_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          EV_SIM_BACKEND: spike
          EV_PK_PATH: /usr/local/riscv64-unknown-elf/bin/pk
        shell: bash

      - name: Spike simulation smoke test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e EV_SIM_BACKEND=spike \
            -e EV_PK_PATH=/usr/local/riscv64-unknown-elf/bin/pk \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            bash -c "cd /workspace && ./target/release/ev simulate --target tests/fixtures/sample.xif.yaml"
        shell: bash
