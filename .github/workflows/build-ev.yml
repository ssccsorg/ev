name: Build ev CLI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "Cargo.*"
      - "run.sh"
      - ".github/workflows/build-ev.yml"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout ssccs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: ssccsorg/ssccs
          path: _ssccs

      - name: Move ssccs into place for Cargo path dependency
        run: mv _ssccs ../ssccs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Pre-flight auto-fixes
        run: |
          cargo fmt --all
          cargo clippy --fix --allow-dirty 2>&1 || true
          cargo fix --allow-dirty 2>&1 || true
          cargo fmt --all

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Test synthesis (mock)
        run: |
          EV_SYNTH_BACKEND=mock ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth
          EV_SYNTH_BACKEND=mock ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth --json

      - name: Install Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y -qq yosys

      - name: Test synthesis (real Yosys)
        run: |
          yosys --version
          echo "=== text output ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth
          echo "=== json output ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth --json > /tmp/synth_out.jsonl 2>&1
          # Last line is the synthesis Fact; validate status without Python
          tail -1 /tmp/synth_out.jsonl | grep -q '"status":"ok"' && echo "synthesis Fact OK" || (echo "synthesis FAILED"; exit 1)

      - name: Verify (fixtures)
        run: |
          echo "=== all-pass fixture ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml
          echo ""
          echo "=== mixed fixture (exit 1 expected) ==="
          ./target/release/ev check --target tests/fixtures/sample.xif.yaml && exit 1 || true
          echo "  exit 1: correct (84 of 96 fail eq constraint)"
          echo ""
          echo "=== json output ==="
          ./target/release/ev check --target tests/fixtures/sample.xif.yaml --json | head -8

      - name: Channel demo (ev ↔ SSCCS POC)
        run: |
          echo "=== channel demo (ev ↔ SSCCS POC) ==="
          SSCCS_DIR=../ssccs bash scripts/demo-ssccs-poc.sh
