name: Build ev CLI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout ssccs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: ssccsorg/ssccs
          path: _ssccs

      - name: Move ssccs into place for Cargo path dependency
        run: mv _ssccs ../ssccs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Install Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y -qq yosys

      - name: Test synthesis (real Yosys)
        run: |
          yosys --version
          echo "=== text output ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth
          echo "=== json output ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml --synth --json > /tmp/synth_fact.json 2>/tmp/synth_stderr.txt
          # Validate fact_type and status without Python or jq
          grep -q '"fact_type":"synthesis_result"' /tmp/synth_fact.json || (echo "FAILED: missing fact_type"; exit 1)
          grep -q '"status":"ok"' /tmp/synth_fact.json || (echo "FAILED: synthesis status not ok"; exit 1)
          echo "synthesis Fact OK"

      - name: Verify (fixtures)
        run: |
          echo "=== all-pass fixture ==="
          ./target/release/ev check --target tests/fixtures/all_pass.xif.yaml
          echo ""
          echo "=== mixed fixture (exit 1 expected) ==="
          ./target/release/ev check --target tests/fixtures/sample.xif.yaml && exit 1 || true
          echo "  exit 1: correct (84 of 96 fail eq constraint)"
          echo ""
          echo "=== json output ==="
          ./target/release/ev check --target tests/fixtures/sample.xif.yaml --json | head -8

      - name: Channel demo (ev ↔ SSCCS POC)
        run: |
          echo "=== channel demo (ev ↔ SSCCS POC) ==="
          SSCCS_DIR=../ssccs bash scripts/demo-ssccs-poc.sh
