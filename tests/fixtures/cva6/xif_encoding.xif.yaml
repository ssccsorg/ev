# CVA6 CV-X-IF encoding space — encoding-only verification (register-reduced).
#
# Purpose: Validate funct3/funct7 encoding validity via Spike simulation.
# Register fields (rs1, rs2, rd) are reduced to {0, 1} to minimize combinations.
#
# Cross-checked against actual CVA6 RTL:
#   - cva6/core/cvxif_example/include/cvxif_instr_pkg.sv (hardware decoder)
#   - cva6/verif/env/corev-dv/custom/cvxif_custom_instr.sv (DV class)
#
# funct3=000: CUS_ADD_MULTI, CUS_U_ADD, CUS_S_ADD, CUS_NOP
#   funct7=0  (0b0000000): NOP
#   funct7=2  (0b0000010): CUS_U_ADD
#   funct7=6  (0b0000110): CUS_S_ADD
#   funct7=8  (0b0001000): CUS_ADD_MULTI
# funct3=001: ADD / DOUBLE_RS1 / DOUBLE_RS2 / ADD_MULTI (via funct7=0, bits[26:25])
# funct3=010: CUS_EXC           (funct7=96 only)
# funct3=011..111: illegal
#
# Reduced space: 8×128×2×2×2 = 8,192 raw combinations
# Valid (after constraints): 5×2×2×2 + 1×2×2×2 + 1×2×2×2 = 56 pass
#
# Note: ADD_RS3 (func2=01, funct7 via funct3=000) requires R4 format support
# and is not included in this encoding-only fixture.

target: cva6_xif_encoding
fields:
  funct3:
    range: [0, 7]
  funct7:
    range: [0, 127]
  rs1:
    range: [0, 1]
  rs2:
    range: [0, 1]
  rd:
    range: [0, 1]
constraints:
  - type: oneof
    field: "funct3"
    values: [0, 1, 2]
  - type: cross
    field_a: "funct3"
    field_b: "funct7"
    mapping:
      0: [0, 2, 6, 8]
      1: [0]
      2: [96]
  - type: enable_mask
    field: "funct3"
    value: 1
    disable: ["rs1", "rs2", "rd"]
  - type: enable_mask
    field: "funct3"
    value: 2
    disable: ["rd"]
projector:
  type: sum
