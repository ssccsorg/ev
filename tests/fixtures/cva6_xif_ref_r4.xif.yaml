# CVA6 CV-X-IF encoding space — aligned with hardware decoder mask table.
#
# Cross-checked against actual CVA6 RTL:
#   - cva6/core/cvxif_example/include/cvxif_instr_pkg.sv (hardware decoder, 10 entries)
#   - cva6/core/cvxif_example/instr_decoder.sv (mask-based decoding logic)
#   - cva6/core/cvxif_example/copro_alu.sv (execution per opcode)
#   - cva6/verif/env/corev-dv/custom/cvxif_custom_instr.sv (DV verification class)
#
# Hardware decoder uses mask matching: (mask & instr) == pattern.
# Mask bit = 1 means the corresponding bit is checked; 0 means don't-care.
#
# Hardware decoder entries (custom3 opcode 0x7B):
#   funct3=000, bits[26:25]=00:  HW_NOP      (writeback=0, reg_read=000)
#   funct3=001, bits[26:25]=00:  ADD         (writeback=1, reg_read=011 = rs1,rs2)
#   funct3=001, bits[26:25]=01:  DOUBLE_RS1  (writeback=1, reg_read=001 = rs1)
#   funct3=001, bits[26:25]=10:  DOUBLE_RS2  (writeback=1, reg_read=010 = rs2)
#   funct3=001, bits[26:25]=11:  ADD_MULTI   (writeback=1, reg_read=011 = rs1,rs2)
#   funct3=001, bits[26:25]=00 + rs2[4:2]=001: ADD_RS3_R (writeback=1, reg_read=111)
#
# DV class (cvxif_custom_instr.sv) encoding:
#   CUS_NOP uses funct3=001 + funct7=0 + set_rand_mode(rd=0, rs1=0, rs2=0).
#   This is a DIFFERENT encoding from hardware NOP (funct3=000).
#   Both NOP paths are valid in the system.
#   HW_NOP (funct3=000): accepted by hardware decoder, writeback=0.
#   CUS_NOP (funct3=001, rd=rs1=rs2=0): generated by DV class, functionally a NOP.
#
# funct3=001 bits[26:25] sub-decoding maps to func2 field:
#   func2=00: ADD        (when rs2[4:2] != 001) or ADD_RS3_R (when rs2[4:2] == 001)
#   func2=01: DOUBLE_RS1
#   func2=10: DOUBLE_RS2
#   func2=11: ADD_MULTI
#
# funct3=010: CUS_EXC (via DV class get_func3=3'b010, get_func7=7'b1100000)
#   has_rd=0 per DV class set_rand_mode.
#
# funct7 sub-decoding for funct3=000 (R-type, funct7[6:0]):
#   funct7=8  (0b0001000): CUS_ADD_MULTI
#   funct7=2  (0b0000010): CUS_U_ADD
#   funct7=6  (0b0000110): CUS_S_ADD
#   funct7=0  + func2=01 : CUS_ADD_RS3 (R4 format, func2 bits [26:25])
#
# Note: HW_NOP at funct3=000 accepts ANY funct7 value.
#   Its mask covers funct7 bits [31:25] = 11111, but the comparison
#   instr value has funct7=0000000. So funct3=000 + funct7=anything
#   matches HW_NOP. We allow funct7 ∈ {0, 2, 6, 8} to cover the
#   DV class instructions too, but any funct7 is valid for HW_NOP.
#
# Register fields sampled (0..3) to keep combinations manageable.
# Full register range (32×32×32) available in cva6_xif_ref.xif.yaml.

target: cva6_xif_ref_r4
encoding: r4
fields:
  funct3:
    range: [0, 7]
  funct7:
    range: [0, 127]
  func2:
    range: [0, 3]
  rs1:
    range: [0, 3]
  rs2:
    range: [0, 3]
  rd:
    range: [0, 3]
constraints:
  # All three funct3 values are valid.
  - type: oneof
    field: "funct3"
    values: [0, 1, 2]

  # funct3 → funct7 mapping (consolidated single cross constraint).
  # funct3=0: funct7 sub-decoding for CUS_ADD_MULTI(8), CUS_U_ADD(2), CUS_S_ADD(6),
  #           CUS_ADD_RS3 via func2(0), HW_NOP (any funct7, allowed set covers all).
  # funct3=1: funct7 must be 0 (DV class constraint for all funct3=001 variants).
  # funct3=2: funct7 must be 96 (CUS_EXC).
  - type: cross
    field_a: "funct3"
    field_b: "funct7"
    mapping:
      0: [0, 2, 6, 8]
      1: [0]
      2: [96]

  # funct3=0: func2=01 for CUS_ADD_RS3 (R4 format).
  # funct3=1: func2 acts as sub-opcode for ADD/DOUBLE_RS1/DOUBLE_RS2/ADD_MULTI.
  - type: cross
    field_a: "funct3"
    field_b: "func2"
    mapping:
      0: [0, 1, 2, 3]
      1: [0, 1, 2, 3]

  # funct3=001 + func2=00 + rs2[4:2]=001: ADD_RS3_R.
  # When func2=00 and rs2[4:2] != 001, the encoding matches ADD.
  # This constraint restricts rs2 range for funct3=1 + func2=00 + rs2[4:2]=001.
  # Note: ev cannot express rs2[4:2] bit-slice; we approximate with rs2 values 8-15
  # (register x8..x15 have bits [4:2] covering 010, 011, 100, 101).
  # For sampled range [0,3], rs2[4:2] is always 000, so ADD_RS3_R is not reachable.
  # This is a known limitation — full rs2 range needed for ADD_RS3_R matching.

  # CUS_NOP (funct3=1): force rs1=rs2=rd=0 (DV class set_rand_mode).
  - type: enable_mask
    field: "funct3"
    value: 1
    disable: ["rs1", "rs2", "rd"]

  # CUS_EXC (funct3=2): force rd=0 (DV class has_rd=0).
  - type: enable_mask
    field: "funct3"
    value: 2
    disable: ["rd"]

projector:
  type: sum
