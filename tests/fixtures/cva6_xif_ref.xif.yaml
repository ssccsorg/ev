# CVA6 CV-X-IF encoding space — verification suite specification.
#
# Based on cva6/verif/env/corev-dv/custom/cvxif_custom_instr.sv (verification
# instruction definitions) and cva6/core/cvxif_instr_pkg.sv (coprocessor decode).
# Both part of the OpenHW CVA6 RISC-V core.
#
# Custom-3 opcode (0x7B) — R-type encoding (verification suite mapping):
#   funct3=000: ADD variants  (funct7 sub-decoded)
#   funct3=001: ADD           (funct7=0 only)
#   funct3=010: EXC           (funct7=96 = 0b1100000)
#   funct3=011..111: illegal  (rejected by coprocessor)
#
# funct7 sub-decoding (funct3=000):
#   funct7=0b0001000 (8):  ADD_MULTI
#   funct7=0b0000010 (2):  U_ADD
#   funct7=0b0000110 (6):  S_ADD
#
# CUS_ADD_RS3 uses func2=01 within R4-type MADD opcode (not custom-3).
# Not modeled here.
#
# Verification space (rs1/rs2/rd reduced to 0..7 to stay under MAX_COMBINATIONS):
#   8 × 64 × 8 × 8 × 8 = 262,144 raw combinations.
#   oneof: funct3 ∈ {0, 1, 2}
#   cross: funct3=0 → funct7 ∈ {8, 2, 6}
#          funct3=1 → funct7 ∈ {0}
#          funct3=2 → funct7 ∈ {96}
#   Valid: 3×8×8×8 + 1×8×8×8 + 1×8×8×8 = 1,536 + 512 + 512 = 2,560 pass

target: cva6_xif_ref
fields:
  funct3:
    range: [0, 7]
  funct7:
    range: [0, 127]
  rs1:
    range: [0, 7]
  rs2:
    range: [0, 7]
  rd:
    range: [0, 7]
constraints:
  - type: oneof
    field: "funct3"
    values: [0, 1, 2]
  - type: cross
    field_a: "funct3"
    field_b: "funct7"
    mapping:
      0: [2, 6, 8]
      1: [0]
      2: [96]
projector:
  type: sum
