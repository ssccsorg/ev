# SSCCS Documentation Build Configuration
# This file externalizes target-specific configurations and exclude patterns.

# Target-specific configurations (optional)
# These settings override defaults for specific targets.
# If a target is not listed here, it will still be built with default settings.
target_config:
  whitepaper-whitepaper:
    c2pa: true

  proposal-proposal:
    c2pa: true

# Pre-build commands (additional to built-in defaults)
# Built-in defaults: generate_latest_docs, resolve, rumdl fmt
# Commands listed here run AFTER the defaults.
pre_build:
  _global:
    - python3 ../poc/baremetal_riscv/sv/sv2dot.py ../poc/baremetal_riscv/sv/ > arch/sv_architecture.dot
    - python3 arch/generate.py

# Post-render commands (additional to built-in defaults)
# Built-in defaults: generate_llms_txt
# Commands listed here run AFTER the defaults.
post_render:
  _global: []

# Exclude patterns (gitignore-style)
# Files and directories matching these patterns will be excluded from target discovery.
exclude:
  - "**/README.md"
  - "**/*.llms.md"
  - "**/llms.txt"

  # Directory patterns (trailing slash indicates directory)
  - "**/_include/"
  - "**/_extensions/"
  - "**/_utils/"
  - "**/*_output/"
  - "**/*_files/"
  - "**/*_cached/"
  - "**/*_libs/"
  - "**/*_pages/"
  - "**/.jupyter_cache"
